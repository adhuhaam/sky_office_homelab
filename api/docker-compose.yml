services:
  # Legacy Express API — not used in production after .NET cutover.
  # Rollback: restore this service name as leo-api in root compose if needed.
  leo-api:
    build:
      context: ../leo-os
      dockerfile: apps/api/Dockerfile
    container_name: leo-api
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - homelab

networks:
  homelab:
    external: true
